<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Xem phim trực tuyến miễn phí trên Rạp Phim Vui.">
  <title>Đang tải... — Rạp Phim Vui</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-accent">Rạp</span>PhimVui
      </a>
      <div class="nav-right">
        <div class="search-group">
          <input type="text" id="searchInput" placeholder="Tìm tên phim...">
          <button id="searchBtn" aria-label="Tìm kiếm"><i class="fas fa-search"></i></button>
        </div>
        <div id="authSection" class="auth-section"></div>
      </div>
    </div>
  </header>

  <!-- Movie Page Content -->
  <main class="content movie-page">

    <!-- Backdrop Hero -->
    <section id="movieBackdrop" class="movie-backdrop">
      <div class="movie-backdrop-skeleton skeleton"></div>
    </section>

    <!-- Player Section -->
    <section class="movie-player-section">
      <div class="movie-player-container">

        <!-- Player -->
        <div id="playerWrapper" class="player-wrapper">
          <div class="player-placeholder" id="playerPlaceholder">
            <div class="player-placeholder-content">
              <i class="fas fa-play-circle"></i>
              <span>Ấn nút bên dưới để xem phim</span>
            </div>
          </div>
          <iframe id="videoIframe" allowfullscreen style="display:none;"></iframe>
        </div>

        <!-- Player Controls -->
        <div class="player-controls">
          <button class="btn btn-primary btn-play" id="playBtn">
            <i class="fas fa-play"></i> XEM PHIM
          </button>
          <div class="player-controls-right">
            <button class="btn btn-ghost btn-sm" id="lightToggle" title="Tắt đèn">
              <i class="fas fa-lightbulb"></i>
            </button>
          </div>
        </div>

        <!-- Movie Info -->
        <div id="movieInfo" class="movie-detail-card">
          <div class="movie-detail-card-skeleton">
            <div class="skeleton" style="height: 36px; width: 60%; margin-bottom: 16px; border-radius: 8px;"></div>
            <div class="skeleton" style="height: 20px; width: 40%; margin-bottom: 24px; border-radius: 6px;"></div>
            <div class="skeleton" style="height: 14px; width: 100%; margin-bottom: 8px; border-radius: 4px;"></div>
            <div class="skeleton" style="height: 14px; width: 90%; margin-bottom: 8px; border-radius: 4px;"></div>
            <div class="skeleton" style="height: 14px; width: 75%; border-radius: 4px;"></div>
          </div>
        </div>

      </div>

      <!-- Sidebar - Similar Movies -->
      <aside class="movie-sidebar">
        <h3 class="sidebar-title">Phim liên quan</h3>
        <div id="similarMovies" class="similar-movies-list">
          <div class="skeleton similar-skeleton"></div>
          <div class="skeleton similar-skeleton"></div>
          <div class="skeleton similar-skeleton"></div>
          <div class="skeleton similar-skeleton"></div>
          <div class="skeleton similar-skeleton"></div>
          <div class="skeleton similar-skeleton"></div>
        </div>
      </aside>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-brand">
      © 2026 <span>RạpPhimVui</span> — Xem phim mọi lúc mọi nơi
    </div>
    <div class="footer-social">
      <a href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <i class="fa-brands fa-github"></i>
      </a>
      <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <i class="fa-brands fa-facebook-f"></i>
      </a>
      <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>
    </div>
  </footer>

  <!-- Lights Off Overlay -->
  <div id="lightsOverlay" class="lights-overlay"></div>

  <script src="js/app.js"></script>
</body>
</html>
