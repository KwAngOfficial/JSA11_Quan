<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Rạp Phim Vui — Xem phim trực tuyến miễn phí với hàng ngàn bộ phim hot nhất.">
  <title>Rạp Phim Vui — Xem Phim Trực Tuyến</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-accent">Rạp</span>PhimVui
      </a>
      <div class="nav-right">
        <div class="search-group">
          <input type="text" id="searchInput" placeholder="Tìm tên phim...">
          <button id="searchBtn" aria-label="Tìm kiếm"><i class="fas fa-search"></i></button>
        </div>
        <div id="authSection" class="auth-section"></div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="content">
    <!-- Hero Banner -->
    <section id="heroSection" class="hero"></section>

    <!-- Movie Grid -->
    <section class="movie-section">
      <div class="section-header">
        <h2 id="sectionTitle" class="section-title">Phim phổ biến</h2>
      </div>
      <div class="movie-grid" id="movieGrid"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-brand">
      © 2026 <span>RạpPhimVui</span> — Xem phim mọi lúc mọi nơi
    </div>
    <div class="footer-social">
      <a href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <i class="fa-brands fa-github"></i>
      </a>
      <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <i class="fa-brands fa-facebook-f"></i>
      </a>
      <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
