
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rạp Phim Vui</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="location.reload()">
                <span></span> Rạp Phim Vui
            </div>

            <div class="nav-right">
                <div class="search-group">
                    <input type="text" id="searchInput" placeholder="Tìm tên phim...">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <div id="authSection"></div>
            </div>
        </div>
    </header>

    <main class="content">
        <section id="heroSection" class="hero"></section>

        <section class="movie-section">
            <h2 id="sectionTitle">Phim phổ biến </h2>
            <div class="movie-grid" id="movieGrid"></div>
        </section>
    </main>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
        
        
    </div>
    
    <footer>

      <div>
        <p>Contact:</p>
        <a target="_blank" rel="noopener noreferrer" href="https://www.google.com/?hl=vi">
          <i class="fa-brands fa-github"></i>
        </a>
        <a target="_blank" rel="noopener noreferrer" href="https://www.google.com/?hl=vi">
          <i class="fa-brands fa-facebook"></i>
        </a>
        <a target="_blank" rel="noopener noreferrer" href="https://www.google.com/?hl=vi">
          <i class="fa-brands fa-instagram"></i>
        </a>
      </div>
    </footer>

    <script src="script3.js"></script>
</body>
</html>
