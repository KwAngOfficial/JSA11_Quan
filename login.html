        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .login-card {
        background: rgba(36, 41, 44, 0.75);
        padding: 60px;
        border-radius: 8px;
        width: 100%;
        max-width: 400px;
        box-sizing: border-box;
      }
      .brand {
        color: var(--primary);
        font-size: 30px;
        font-weight: bold;
        margin-bottom: 30px;
        text-align: center;
      }
      h2 {
        color: #fff;
        margin-bottom: 20px;
      }
      input {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        background: #333;
        border: none;
        border-radius: 4px;
        color: #fff;
      }
      .btn-login {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
      }
      .footer {
        color: #737373;
        margin-top: 20px;
        font-size: 14px;
      }
      .footer a {
        color: #fff;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="brand">Rạp Phim Vui</div>
      <h2>Đăng nhập</h2>
      <form id="loginForm">
        <input
          type="text"
          id="username"
          placeholder="Tên đăng nhập hoặc Email"
          required
        />
        <input type="password" id="password" placeholder="Mật khẩu" required />
        <button type="submit" class="btn-login">Đăng nhập</button>
      </form>
      <div class="footer">
        Mới tham gia? <a href="register.html">Đăng ký ngay.</a>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const user = document.getElementById("username").value;
          const pass = document.getElementById("password").value;

          const savedAccount = JSON.parse(localStorage.getItem("account"));

          if (
            savedAccount &&
            user === savedAccount.username &&
            pass === savedAccount.password
          ) {
            localStorage.setItem("user", user);

            window.location.href = "index.html";
          } else {
            alert("Sai tài khoản hoặc mật khẩu");
          }
        });
    </script>
  </body>
</html>
