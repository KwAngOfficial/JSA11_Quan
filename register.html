<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Đăng ký tài khoản Rạp Phim Vui để bắt đầu xem phim trực tuyến.">
  <title>Đăng ký — Rạp Phim Vui</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-brand">
      <a href="index.html"><span class="logo-accent">Rạp</span>PhimVui</a>
    </div>

    <h1 class="auth-title">Tạo tài khoản</h1>

    <form id="registerForm" class="auth-form">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input
          type="text"
          id="username"
          class="input-field"
          placeholder="Tên đăng nhập"
          autocomplete="username"
          required
        >
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input
          type="password"
          id="password"
          class="input-field"
          placeholder="Mật khẩu (ít nhất 4 ký tự)"
          autocomplete="new-password"
          minlength="4"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        <i class="fas fa-user-plus"></i> Đăng ký
      </button>
    </form>

    <div class="auth-footer">
      Đã có tài khoản? <a href="login.html">Đăng nhập</a>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
